services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloud_producthunt:${IMAGE_TAG:-latest}
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - shared

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-producthunter}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-producthunter}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared

  typesense:
    image: typesense/typesense:30.1
    restart: on-failure
    environment:
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY:-typesense}
    ports:
      - "8108:8108"
    volumes:
      - ./typesense-data:/data
    command: '--data-dir /data --api-key=${TYPESENSE_API_KEY} --enable-cors'
    networks:
      - shared

networks:
  shared:
    driver: bridge

volumes:
  pg_data: